<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in | Southern New Hampshire Pinball Club</title>
  <link rel="stylesheet" href="assets/css/styles.css">
  <script src="assets/js/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="assets/js/supabase-init.js"></script>
</head>
<body>

<header>
  <h1>Southern New Hampshire Pinball Club</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="events.html">Events</a>
    <a href="standings.html">Standings</a>
    <a href="about.html">About</a>
    <a href="signin.html" aria-current="page">Sign in</a>
  </nav>
</header>

<section class="hero">
  <h2>Flip. Compete. Repeat.</h2>
</section>

<section class="content">
  <h3>Welcome to the Southern New Hampshire Pinball Club!</h3>
  <input id="email" type="email" autocomplete="email" placeholder="Email" />
  <input id="password" type="password" autocomplete="current-password" placeholder="Password" />
  <button onclick="login()">Login</button>
  <button onclick="signup()">Sign Up</button>
  <p id="status" aria-live="polite"></p>
</section>

<footer>
  <img src="assets/images/snhpc_logo_small_cropped.png" alt="SNH Pinball Club Logo" class="footer-logo">
  <p>©2026 Southern New Hampshire Pinball Club</p>
</footer>

<script>
  function getCredentials() {
    var email = document.getElementById("email").value.trim();
    var password = document.getElementById("password").value;
    return { email: email, password: password };
  }

  async function signup() {
    var status = document.getElementById("status");
    if (!window.snhSupabase) {
      status.innerText = "Configuration error. See README.";
      return;
    }
    var creds = getCredentials();
    if (!creds.email || !creds.password) {
      status.innerText = "Enter email and password.";
      return;
    }

    var result = await window.snhSupabase.auth.signUp({
      email: creds.email,
      password: creds.password,
    });

    if (result.error) {
      status.innerText = result.error.message;
      return;
    }
    if (result.data.session) {
      window.location.href = "index.html";
      return;
    }
    status.innerText =
      "Check your email to confirm your account, then sign in here.";
  }

  async function login() {
    var status = document.getElementById("status");
    if (!window.snhSupabase) {
      status.innerText = "Configuration error. See README.";
      return;
    }
    var creds = getCredentials();
    if (!creds.email || !creds.password) {
      status.innerText = "Enter email and password.";
      return;
    }

    var result = await window.snhSupabase.auth.signInWithPassword({
      email: creds.email,
      password: creds.password,
    });

    if (result.error) {
      status.innerText = result.error.message;
      return;
    }
    window.location.href = "index.html";
  }
</script>

</body>
</html>
