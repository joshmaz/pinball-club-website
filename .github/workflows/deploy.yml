name: Deploy to AWS S3

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Check events JSON for duplicates
      run: node scripts/check-events-duplicates.mjs

    - name: Write public site config
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        GAMES_CATALOG_SOURCE: ${{ secrets.GAMES_CATALOG_SOURCE }}
      run: node scripts/write-config.mjs

    - name: Configure AWS credentials (OIDC)
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Deploy to S3
      run: |
        aws s3 sync . s3://${{ secrets.S3_BUCKET }} \
          --delete \
          --exclude ".env" \
          --exclude ".env.*" \
          --exclude ".git/*" \
          --exclude ".gitignore" \
          --exclude ".github/*" \
          --exclude ".cursor/*" \
          --exclude "supabase/*" \
          --exclude "scripts/*" \
          --exclude "docs/*" \
          --exclude "temp/*" \
          --exclude "CLAUDE.md" \
          --exclude "CONTENT_GUIDE.md" \
          --exclude "README.md"
        aws s3 cp donate.html s3://${{ secrets.S3_BUCKET }}/donate \
          --content-type "text/html; charset=utf-8"
        # Serve real donate page at /donate/ (not donate.html stub — its relative refresh breaks under /donate/)
        aws s3api put-object \
          --bucket "${{ secrets.S3_BUCKET }}" \
          --key "donate/" \
          --body donate/index.html \
          --content-type "text/html; charset=utf-8"
        # Archived Wix pages are stored at <dir>/index.html, but the mirror links
        # between pages with extensionless directory URLs (e.g. /wix_archive/.../about-us).
        # S3 REST + CloudFront (OAC) do not resolve a directory to its index document,
        # so those links return an "AccessDenied" XML error. Publish a copy of each
        # index.html at its extensionless key so the links resolve. Re-applied after each
        # sync because --delete would otherwise remove these objects.
        find wix_archive -name index.html | while IFS= read -r f; do
          key="${f%/index.html}"
          aws s3 cp "$f" "s3://${{ secrets.S3_BUCKET }}/$key" \
            --content-type "text/html; charset=utf-8"
        done

    - name: Invalidate CloudFront cache
      if: ${{ env.CLOUDFRONT_DISTRIBUTION_ID != '' }}
      run: |
        aws cloudfront create-invalidation \
          --distribution-id "${{ env.CLOUDFRONT_DISTRIBUTION_ID }}" \
          --paths "/*"